<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dev Vision Portfolio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    background:#0f172a;
    color:white;
    font-family:Arial;
    margin:0;
}
.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}
button{
    padding:12px 20px;
    background:#1e3a8a;
    border:none;
    border-radius:6px;
    color:white;
    cursor:pointer;
    margin-top:15px;
    margin-bottom: 15px;
}
#portfolioForm{ display:none; }
#portfolioView{ display:none; }

input,textarea{
    width:90%;
    padding:12px;
    margin-top:12px;
    border-radius:6px;
    border:none;
    background:#1e3a8a;
    color:white;
}
.profile-card{
    background:#1e3a8a;
    padding:40px;
    border-radius:15px;
    text-align:center;
}
.section{ margin-top:40px; }
.about-box{
    background:#1e3a8a;
    padding:25px;
    border-radius:12px;
}
.skills span{
    display:inline-block;
    background:#0f172a;
    padding:8px 15px;
    margin:6px;
    border-radius:8px;
}
</style>
</head>

<body>

<div class="container">

<h2>Dev Vision Portfolio</h2>

<button id="editBtn">Create / Edit Portfolio</button>

<!-- FORM -->
<div id="portfolioForm">

<input id="name" placeholder="Full Name">
<input id="title" placeholder="Professional Title">
<textarea id="about" placeholder="About Me"></textarea>
<input id="skills" placeholder="Skills (comma separated)">
<input id="extra" placeholder="Extra Portfolio Info">

<button id="saveBtn">Save Portfolio</button>

</div>

<!-- VIEW -->
<div id="portfolioView">

<div class="profile-card">
<h1 id="previewName"></h1>
<p id="previewTitle"></p>
</div>

<div class="section">
<h2>About Me</h2>
<div class="about-box">
<p id="previewAbout"></p>
</div>
</div>

<div class="section">
<h2>Skills</h2>
<div class="skills" id="previewSkills"></div>
</div>

<div class="section">
<h2>Portfolio Link</h2>
<input id="shareLink" readonly>
<button id="copyLinkBtn">Copy Link</button>
</div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* 🔥 PUT YOUR REAL FIREBASE CONFIG */
const firebaseConfig = {
      apiKey: "AIzaSyAjPnE3Km8yo_57t6kpUc7Jj9TtXqeBKew",
  authDomain: "website-53417.firebaseapp.com",
  projectId: "website-53417",
  storageBucket: "website-53417.firebasestorage.app",
  messagingSenderId: "1049856174962",
  appId: "1:1049856174962:web:1817fdba2bbbae9c6a8beb",
  measurementId: "G-QFJHJHLHC4"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;

/* DOM ELEMENTS */
const portfolioForm = document.getElementById("portfolioForm");
const portfolioView = document.getElementById("portfolioView");
const editBtn = document.getElementById("editBtn");
const saveBtn = document.getElementById("saveBtn");
const copyLinkBtn = document.getElementById("copyLinkBtn");

const nameInput = document.getElementById("name");
const titleInput = document.getElementById("title");
const aboutInput = document.getElementById("about");
const skillsInput = document.getElementById("skills");
const extraInput = document.getElementById("extra");

const previewName = document.getElementById("previewName");
const previewTitle = document.getElementById("previewTitle");
const previewAbout = document.getElementById("previewAbout");
const previewSkills = document.getElementById("previewSkills");
const shareLink = document.getElementById("shareLink");

/* AUTH CHECK */
onAuthStateChanged(auth, async (user)=>{

if(!user){
window.location.href="login.html";
return;
}

currentUser = user;

const snap = await getDoc(doc(db,"users",user.uid));

if(snap.exists()){
showPortfolio(snap.data());
}else{
portfolioForm.style.display="block";
}

});

/* EDIT BUTTON */
editBtn.addEventListener("click",()=>{
portfolioForm.style.display="block";
portfolioView.style.display="none";
});

/* SAVE PORTFOLIO */
saveBtn.addEventListener("click", async ()=>{

if(!currentUser) return;

const data = {
name: nameInput.value.trim(),
title: titleInput.value.trim(),
about: aboutInput.value.trim(),
skills: skillsInput.value.trim(),
extra: extraInput.value.trim()
};

await setDoc(doc(db,"users",currentUser.uid), data, {merge:true});

alert("Portfolio Saved 🔥");

showPortfolio(data);

});

/* SHOW PORTFOLIO */
function showPortfolio(data){

portfolioForm.style.display="none";
portfolioView.style.display="block";

previewName.innerText = data.name || "";
previewTitle.innerText = data.title || "";
previewAbout.innerText = data.about || "";

previewSkills.innerHTML = "";

if(data.skills){
data.skills.split(",").forEach(skill=>{
const span = document.createElement("span");
span.innerText = skill.trim();
previewSkills.appendChild(span);
});
}

generateLink();

}

/* GENERATE LINK */
function generateLink(){
shareLink.value =
window.location.origin + "/portfolio.html?uid=" + currentUser.uid;
}

/* COPY LINK */
copyLinkBtn.addEventListener("click",()=>{
shareLink.select();
document.execCommand("copy");
alert("Link Copied 🔥");
});

</script>

</body>
</html>
