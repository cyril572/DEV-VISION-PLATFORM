<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dev Vision Portfolio</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    background:#0f172a;
    color:white;
    font-family:Arial;
    margin:0;
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

/* Buttons */

button{
    padding:12px 20px;
    background:#1e3a8a;
    border:none;
    border-radius:6px;
    color:white;
    cursor:pointer;
    margin-top:15px;
    margin-bottom: 10px;
}

/* Form */

#portfolioForm{
    display:none;
}

input,textarea{
    width:90%;
    padding:12px;
    margin-top:12px;
    border-radius:6px;
    border:none;
    background:#1e3a8a;
    color:white;
}

input::placeholder,
textarea::placeholder{
    color:#cbd5e1;
}

/* Portfolio View */

#portfolioView{
    display:none;
}

.profile-card{
    background:#1e3a8a;
    padding:40px;
    border-radius:15px;
    text-align:center;
}

.section{
    margin-top:40px;
}

.section h2{
    border-left:5px solid #1e3a8a;
    padding-left:10px;
}

.about-box{
    background:#1e3a8a;
    padding:25px;
    border-radius:12px;
}

.skills span{
    display:inline-block;
    background:#0f172a;
    padding:8px 15px;
    margin:6px;
    border-radius:8px;
}

.work-card{
    background:#1e3a8a;
    padding:20px;
    border-radius:12px;
    margin-top:15px;
}

.work-card a{
    color:#38bdf8;
    text-decoration:none;
}
 @media (max-width:700px) {
    body h1{
        font-size:26px;
    }
 }

</style>

</head>

<body>

<div class="container">

<h2>Dev Vision Portfolio</h2>

<button id="editBtn">Create / Edit Portfolio</button>

<!-- PORTFOLIO FORM -->

<div id="portfolioForm">

<input id="name" placeholder="Full Name">
<input id="title" placeholder="Professional Title">

<textarea id="about" placeholder="About Me"></textarea>

<input id="skills" placeholder="Skills (comma separated)">
<input id="extra" placeholder="Extra Portfolio Info">

<button id="saveBtn">Save Portfolio</button>

</div>

<!-- PORTFOLIO VIEW -->

<div id="portfolioView">

<div class="profile-card">

<h1 id="previewName"></h1>
<p id="previewTitle"></p>

</div>

<div class="section">
<h2>About Me</h2>
<div class="about-box">
<p id="previewAbout"></p>
</div>
</div>

<div class="section">
<h2>Skills</h2>
<div class="skills" id="previewSkills"></div>
</div>

<div class="section">
<h2>My Works</h2>
<a href="work.html"><p> Add Works</p></a>
<div id="previewWorks"></div>
</div>

<div class="section">

<h2>Dev Vision Portfolio Link</h2>

<div style="display:flex; gap:10px; flex-wrap:wrap;">

<input id="shareLink" readonly style="
flex:1;
padding:12px;
border:none;
border-radius:6px;
background:#1e3a8a;
color:white;
">

<button id="copyLinkBtn">Copy Link</button>

</div>

</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig={
    apiKey: "AIzaSyAjPnE3Km8yo_57t6kpUc7Jj9TtXqeBKew",
  authDomain: "website-53417.firebaseapp.com",
  projectId: "website-53417",
  storageBucket: "website-53417.firebasestorage.app",
  messagingSenderId: "1049856174962",
  appId: "1:1049856174962:web:1817fdba2bbbae9c6a8beb",
  measurementId: "G-QFJHJHLHC4"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);

let user=null;

/* AUTH CHECK */

onAuthStateChanged(auth,async u=>{

if(!u){
window.location.href="login.html";
return;
}

user=u;

const uid=new URLSearchParams(window.location.search)
.get("uid") || user.uid;

const snap=await getDoc(doc(db,"users",uid));

if(snap.exists()){
showPortfolio(snap.data());
}else{
portfolioForm.style.display="block";
}

});

/* EDIT BUTTON */

editBtn.onclick=()=>{
portfolioForm.style.display="block";
portfolioView.style.display="none";
};

/* SAVE PORTFOLIO */

saveBtn.onclick=async()=>{

if(!user) return;

const data={
name:name.value,
title:title.value,
about:about.value,
skills:skills.value
.split(",")
.map(s=>s.trim())
.filter(s=>s),
extra:extra.value
};

await setDoc(doc(db,"users",user.uid),data,{merge:true});

alert("Portfolio Saved 🔥");

showPortfolio(data);

};

/* DISPLAY PORTFOLIO */

function showPortfolio(data){

portfolioForm.style.display="none";
portfolioView.style.display="block";

previewName.innerText=data?.name || "";
previewTitle.innerText=data?.title || "";
previewAbout.innerText=data?.about || "";

previewSkills.innerHTML="";

data?.skills?.forEach(skill=>{
let span=document.createElement("span");
span.innerText=skill;
previewSkills.appendChild(span);
});

/* Works */

previewWorks.innerHTML="";

data?.works?.forEach(work=>{

let div=document.createElement("div");
div.className="work-card";

div.innerHTML=`
<p>${work.description || ""}</p>
<a href="${work.link}" target="_blank">
View Work
</a>
`;

previewWorks.appendChild(div);

});

generateLink();

}

/* LINK GENERATOR */

function generateLink(){

shareLink.value=window.location.origin+
"/portfolio.html?uid="+user.uid;

}

/* COPY LINK */

copyLinkBtn.onclick=()=>{

shareLink.select();
document.execCommand("copy");

alert("Link Copied 🔥");

};

</script>

</body>
</html>
