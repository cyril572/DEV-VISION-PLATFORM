<!DOCTYPE html>
<html>
<head>
<title>Professional Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Segoe UI, sans-serif;
background:linear-gradient(135deg,#f1f5f9,#e2e8f0);
}

/* Sidebar */

.sidebar{
width:250px;
height:100vh;
position:fixed;
background:linear-gradient(180deg,#0f172a,#1e3a8a);
color:white;
padding-top:25px;
}

.sidebar h2{
text-align:center;
}

.sidebar a{
display:block;
color:white;
padding:14px;
margin:8px;
text-decoration:none;
border-radius:10px;
transition:0.3s;
}


#list{
  width: 30px;
  margin: 20px;
  display: none;
}
.nav{
  display: flex;
  justify-content: space-between;
}
#list2{
  width: 50px;
  margin: 20px;
  border-top-left-radius: 30%;
  border-top-right-radius: 30%;
   border-bottom-right-radius: 30%;


   
}

.sidebar a:hover{
background:rgba(255,255,255,0.15);
transform:translateX(6px);
}

/* Main */

.main{
margin-left:270px;
padding:40px;
}

/* Welcome */

.welcome{
background:linear-gradient(135deg,#1e3a8a,#3b82f6);
color:white;
padding:35px;
border-radius:18px;
margin-bottom:30px;
box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

/* Card */

.card{
background:white;
padding:30px;
border-radius:18px;
max-width:500px;
box-shadow:0 8px 25px rgba(0,0,0,0.1);
}

input,textarea{
width:90%;
padding:13px;
margin-top:12px;
border-radius:10px;
border:1px solid #d1d5db;
}

button{
margin-top:18px;
width:95%;
padding:14px;
border:none;
background:linear-gradient(135deg,#0f172a,#1e3a8a);
color:white;
border-radius:12px;
font-size:16px;
cursor:pointer;
}

button:hover{
transform:scale(1.03);
}

.success{
color:green;
margin-top:10px;
font-weight:bold;
}

/* Mobile */

@media(max-width:768px){
.sidebar{
display:none;
border-radius:15px ;

}
.none{
 display: block;
}

.main{
margin-left:0;
}
#list{
  width: 30px;
  margin: 20px;
  display: block;
}
.nav{
  display: flex;
  justify-content: space-between;
}
#list2{
  width: 50px;
  margin: 20px;
  border-top-left-radius: 30%;
  border-top-right-radius: 30%;
   border-bottom-right-radius: 30%;
   
}

}

</style>
</head>

<body>
  <section class="nav">
  <img src="list (1).svg" alt="" id="list">
  <img src="images.png" alt="" id="list2">
  </section>

<div class="sidebar" class="none">
<h2>🚀 Dashboard</h2>

<a href="#" onclick="showSection('home')">🏠 Dashboard</a>
<a href="#" onclick="showSection('profile')">👤 Profile</a>
<a href="chat.html">💬 Opportunities</a>
<a href="portfolio.html">📁 Portfolio</a>
<a href="feeds.html">📰 Feed</a>
<a href="dec.html">📚 Documentation</a>
<a href="discover.html">🔍 Discover Developers</a>

</div>

<div class="main">

<div class="welcome">
<h2>Welcome Back 👋</h2>
<p>Build something amazing today.</p>
<a href="dash.html" style="color: red;">Dev Vision Analytics</a>
</div>

<!-- Home Section -->

<div id="homeSection">
<h2>Dashboard Overview 📊</h2>
<p>Nothing here yet.</p>
</div>

<section>
  <img src="vision.jpg" alt="" style="border-radius: 13px;">
</section>

<!-- Profile Section -->

<div id="profileSection" style="display:none">

<div class="card">

<h2>Profile Settings ✍️</h2>

<input type="text" id="name" placeholder="Full Name">

<textarea id="bio" placeholder="Bio"></textarea>

<input type="text" id="phone" placeholder="Phone Number">

<input type="email" id="email" placeholder="Email Address">

<input type="text" id="skills" placeholder="Skills">

<input type="number" id="experience" placeholder="Years of Experience">

<input type="text" id="address" placeholder="Address">

<button onclick="saveProfile()">Save Profile</button>

<p id="message" class="success"></p>

</div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* 🔥 YOUR FIREBASE CONFIG */

const firebaseConfig = {
  apiKey: "AIzaSyAjPnE3Km8yo_57t6kpUc7Jj9TtXqeBKew",
    authDomain: "website-53417.firebaseapp.com",
    projectId: "website-53417",
    storageBucket: "website-53417.firebasestorage.app",
    messagingSenderId: "1049856174962",
    appId: "1:1049856174962:web:61b6199d24bf68526a8beb",
    measurementId: "G-EBDM2RE0T9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const userId = "user1";

/* Save Profile */

async function saveProfile(){

try{

const profile = {
name:document.getElementById("name").value || "",
bio:document.getElementById("bio").value || "",
phone:document.getElementById("phone").value || "",
email:document.getElementById("email").value || "",
skills:document.getElementById("skills").value || "",
experience:document.getElementById("experience").value || "",
address:document.getElementById("address").value || ""
};

await setDoc(doc(db,"users",userId),profile);

document.getElementById("message").innerText =
"✍️ Profile saved successfully";

}catch(err){
console.error(err);
alert("Save failed");
}

}

/* Load Profile */

async function loadProfile(){

try{

const snap = await getDoc(doc(db,"users",userId));

if(snap.exists()){

const data = snap.data();

document.getElementById("name").value = data.name || "";
document.getElementById("bio").value = data.bio || "";
document.getElementById("phone").value = data.phone || "";
document.getElementById("email").value = data.email || "";
document.getElementById("skills").value = data.skills || "";
document.getElementById("experience").value = data.experience || "";
document.getElementById("address").value = data.address || "";

}

}catch(err){
console.error(err);
}

}

loadProfile();

/* Navigation */

window.showSection = function(section){

document.getElementById("homeSection").style.display =
section==="home" ? "block":"none";

document.getElementById("profileSection").style.display =
section==="profile" ? "block":"none";

}

window.saveProfile = saveProfile;

let y=document.getElementById("list");
let x=document.querySelector(".sidebar");
y.addEventListener("click",()=>{
   x.classList.toggle("none")
   if( x.classList.contains("none")){
     y.src="logout_24dp_E3E3E3_FILL0_wght400_GRAD0_opsz24.svg"
    }else{  
      y.src="list (1).svg"
   }
})

</script>



</body>
</html>
