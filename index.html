<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dev Vision Auth</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ===== RESET ===== */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI", sans-serif;
}

/* ===== BODY ===== */

body{
background:white;

display:flex;
justify-content:center;
align-items:center;
height:100vh;
padding:20px;
animation: fadeIn 1s ease;
}

/* ===== AUTH CARD ===== */

.auth-box{
width:100%;
max-width:400px;
background:linear-gradient(135deg,#0f172a,#1e3a8a);
padding:40px 30px;
border-radius:16px;
box-shadow:0 15px 40px rgba(0,0,0,0.08);
border-top:6px solid #1e3a8a;
text-align:center;
animation: slideUp .8s ease;
}

.auth-box h2{
color: white;
margin-bottom:8px;
}

.subtitle{
font-size:14px;
color: white;
margin-bottom:25px;
}

/* ===== INPUTS ===== */

.auth-box input{
width:100%;
padding:14px;
margin-bottom:15px;
border-radius:8px;
border:1px solid #ddd;
outline:none;
transition:.3s;
}

.auth-box input:focus{
border-color:#758695;
box-shadow:0 0 0 3px rgba(117,134,149,0.2);
}

/* ===== BUTTON ===== */

.auth-btn{
width:100%;
padding:14px;
background: #1e3a8a;
color:white;
border:none;
border-radius:8px;
font-size:15px;
cursor:pointer;
font-weight:600;
transition:.3s;
}

.auth-btn:hover{
background:#5f6f7c;
transform:translateY(-2px);
}

/* ===== TOGGLE TEXT ===== */

.toggle{
margin-top:18px;
font-size:14px;
color: white;
}

.toggle span{
color: white;
font-weight:600;
cursor:pointer;
}

/* ===== MESSAGE ===== */

#message{
margin-top:12px;
color:red;
font-size:13px;
}

/* ===== ANIMATION ===== */

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

@keyframes slideUp{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}
#logo{
    display: none;
}

/* ===== MOBILE RESPONSIVE ===== */

@media(max-width:480px){
.auth-box{
padding:30px 20px;
}
.btn{
    display: none;
}
#logo img{
width: 100%;
border-radius: 100%;

   
}
#logo{
    display: block;
    text-align: center;
    margin-top: 20px;
}
.span span{
   
   box-shadow: 0px 0px 9px black;
    border-top-left-radius: 100px;
     border-top-right-radius: 100px;
      border-bottom-right-radius: 100px;
 
}
.span{
    margin-left: 0px;
    margin-top: 10px;

}
#btn1{
   margin-top: 30px;
   margin-left: 0px;
   cursor: pointer;
   padding: 10px;
   box-shadow: 0px 0px 9px black;
   border-radius: 12px;
   border: none;
   background-color: #1e3a8a;
    color: white;
}
.none{
    display: block;
}

}


</style>
</head>

<body>
    <section id="logo">
        <h1>Dev Vision</h1>
     <img src="images (2).jpg" alt="">
    <div class="span">
        <span>💚</span>
        <span>🩷</span>
        <span>🩵</span>
        <span>❤️</span>
        <span>🧡</span>
    </div>

     <button id="btn1"><p>Getting Started</p></button>
    </section>

<section class="btn" class="none">

<div class="auth-box">
    <p>💚🩷🩵❤️💙🧡</p>

<h2 id="formTitle">Create Account</h2>
<p class="subtitle">Welcome to Dev Vision</p>

<input type="email" id="email" placeholder="Email Address">
<input type="password" id="password" placeholder="Password">

<button class="auth-btn" onclick="handleAuth()" id="authButton">
Sign Up
</button>

<p class="toggle" id="toggleText">
Already have an account?
<span onclick="toggleForm()">Login</span>
</p>

<p id="message"></p>

</div>
</section>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

/* ===== FIREBASE CONFIG ===== */

const firebaseConfig = {
   apiKey: "AIzaSyAjPnE3Km8yo_57t6kpUc7Jj9TtXqeBKew",
  authDomain: "website-53417.firebaseapp.com",
  projectId: "website-53417",
  storageBucket: "website-53417.firebasestorage.app",
  messagingSenderId: "1049856174962",
  appId: "1:1049856174962:web:1817fdba2bbbae9c6a8beb",
  measurementId: "G-QFJHJHLHC4"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

let isLogin = false;

/* ===== TOGGLE LOGIN / SIGNUP ===== */

window.toggleForm = function(){

isLogin = !isLogin;

document.getElementById("formTitle").innerText =
isLogin ? "Welcome Back" : "Create Account";

document.getElementById("authButton").innerText =
isLogin ? "Login" : "Sign Up";

document.getElementById("toggleText").innerHTML =
isLogin
? `Don't have an account? <span onclick="toggleForm()">Sign Up</span>`
: `Already have an account? <span onclick="toggleForm()">Login</span>`;

document.getElementById("message").innerText="";
}

/* ===== AUTH HANDLER ===== */

window.handleAuth = function(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;
const message = document.getElementById("message");

if(!email || !password){
message.innerText="Please fill all fields";
return;
}

/* Signup */

if(!isLogin){

createUserWithEmailAndPassword(auth,email,password)
.then(()=>{
window.location.href="dashboard.html";
})
.catch(err=>{
message.innerText=err.message;
});

}

/* Login */

else{

signInWithEmailAndPassword(auth,email,password)
.then(()=>{
window.location.href="dashboard.html";
})
.catch(err=>{
message.innerText=err.message;
});

}

}

let y=document.getElementById("btn1");
let x=document.querySelector(".btn");
y.addEventListener("click",()=>{
   x.classList.toggle("none")
  if( x.classList.contains("none")){
     let v=document.getElementById("logo")
     v.style.display="none"
      
  }else{
     v.style.display="block"  
  } 
   
})

 

</script>

</body>
</html>
